---
layout: default
title: "Home"
---

<h1>{{ site.title }}</h1>

<p>{{ site.description }}</p>

<h2>posts</h2>

<ul>
{% for post in site.posts %}
  <li>
    <code>{{ post.date | date: "%Y-%m-%d" }}</code>
    &nbsp;
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
  </li>
{% endfor %}
</ul>
