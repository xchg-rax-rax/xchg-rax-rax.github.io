theme: jekyll-theme-chirpy

lang: en
timezone: Etc/UTC

title: "the %rax exchange"
tagline: "Vulnerability research, malware reverse engineering, and low-level systems notes."
description: >-
  Vulnerability research, malware reverse engineering, and low-level systems
  notes by Lewis Patten.

url: "https://xchg-rax-rax.github.io"

github:
  username: xchg-rax-rax

social:
  name: Lewis Patten
  links:
    - https://github.com/xchg-rax-rax

theme_mode: dark

avatar: "https://github.com/xchg-rax-rax.png"

toc: true

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
